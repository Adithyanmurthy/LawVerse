apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcet-worker
  labels:
    app: lcet
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lcet
      component: worker
  template:
    metadata:
      labels:
        app: lcet
        component: worker
    spec:
      containers:
      - name: worker
        image: lcet-backend:latest
        command: ["python", "-m", "src.continuous.orchestrator"]
        env:
        - name: LCET_DB_URL
          valueFrom:
            secretKeyRef:
              name: lcet-secrets
              key: LCET_DB_URL
        - name: LCET_DB_URL_SYNC
          valueFrom:
            secretKeyRef:
              name: lcet-secrets
              key: LCET_DB_URL_SYNC
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: lcet-config
              key: REDIS_URL
        - name: LCET_MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: lcet-config
              key: LCET_MODEL_PATH
        - name: LCET_TOKENIZER_PATH
          valueFrom:
            configMapKeyRef:
              name: lcet-config
              key: LCET_TOKENIZER_PATH
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: lcet-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: models
          mountPath: /app/models
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: lcet-models-pvc
