apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lcet-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - lcet.example.com
    secretName: lcet-tls
  rules:
  - host: lcet.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: lcet-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lcet-frontend
            port:
              number: 3000
