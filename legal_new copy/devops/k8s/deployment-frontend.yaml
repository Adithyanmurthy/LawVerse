apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcet-frontend
  labels:
    app: lcet
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lcet
      component: frontend
  template:
    metadata:
      labels:
        app: lcet
        component: frontend
    spec:
      containers:
      - name: frontend
        image: lcet-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: API_BASE_URL
          value: http://lcet-backend:8000
        - name: WS_URL
          value: ws://lcet-backend:8000/ws
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lcet-frontend
spec:
  selector:
    app: lcet
    component: frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
